<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgriConnect</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="box">

    <h1>🌾 AgriConnect</h1>
    <p class="subtitle">Enter soil & climate details to get crop recommendations</p>

    <label for="n">Nitrogen (N)</label>
    <input type="number" id="n" placeholder="e.g. 90" min="0" />

    <label for="p">Phosphorus (P)</label>
    <input type="number" id="p" placeholder="e.g. 42" min="0" />

    <label for="k">Potassium (K)</label>
    <input type="number" id="k" placeholder="e.g. 43" min="0" />

    <label for="temp">Temperature (°C)</label>
    <input type="number" id="temp" placeholder="e.g. 21" />

    <label for="hum">Humidity (%)</label>
    <input type="number" id="hum" placeholder="e.g. 82" min="0" max="100" />

    <label for="ph">pH Level</label>
    <input type="number" id="ph" placeholder="e.g. 6.5" step="0.1" min="0" max="14" />

    <label for="rain">Rainfall (mm)</label>
    <input type="number" id="rain" placeholder="e.g. 200" min="0" />

    <button id="predictBtn" onclick="predict()">🔍 Predict Crops</button>

    <div id="loading">⏳ Predicting, please wait...</div>
    <div id="result"></div>

</div>

<script src="script.js"></script>
</body>
</html>
